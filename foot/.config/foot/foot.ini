term=foot
# ─── Police ───
font=JetBrainsMono Nerd Font:size=12

# ─── Fenêtre et padding ───
initial-color-theme=dark
initial-window-mode=maximized
pad=4x4
# Optionnel : masquer la bordure de la fenêtre sous Wayland
# csd-color=none
[csd]
preferred = none

# ─── Couleurs (Gruvbox Material Dark Hard) ───
[colors-dark]
# Transparence à 90% (0.9 * 255 = 229 en hexa, mais on l'écrit en décimal ici)
alpha=0.9
alpha-mode=all

foreground=ebdbb2
background=1d2021

# Gris clair / sombre
regular0=665c54
bright0=7c6f64

# Rouge
regular1=cc241d
bright1=fb4934

# Vert
regular2=98971a
bright2=b8bb26

# Jaune
regular3=d79921
bright3=fabd2f

# Bleu
regular4=458588
bright4=83a598

# Violet
regular5=b16286
bright5=d3869b

# Aqua/Cyan
regular6=689d6a
bright6=8ec07c

# Blanc/Beige
regular7=a89984
bright7=bdae93

# ─── Curseur ───
[cursor]
style=underline
color=1d2021 928374
