# ── TRUE COLOR ──────────────────────────────────────────────────────────────
set-window-option -g xterm-keys on       # transmet les touches spéciales xterm
set -s extended-keys on                  # active les touches étendues (ex: Ctrl+Shift)
set -as terminal-features 'xterm\*:extkeys' # active extkeys pour terminaux xterm
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"

# ── FOR IMAGES IN NVIM ──────────────────────────────────────────────────────────────
set -g allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

# ── RELOAD ──────────────────────────────────────────────────────────────────
unbind r
bind r source-file ~/.tmux.conf \; display "Config Reloaded"

# ── TERMINAL FLOTTANT (Vrai Toggle) ────────────────────────────────────────
bind -n M-t if-shell -F '#{==:#{session_name},scratch}' 'detach-client' 'display-popup -d "#{pane_current_path}" -w 80% -h 80% -E "tmux new-session -A -s scratch"'

# ── PREFIX ──────────────────────────────────────────────────────────────────
set -g prefix C-space                        # remplace Ctrl+b par Ctrl+a (plus ergonomique)
unbind C-b                               # désactive l'ancien prefix
unbind M-s                               # libère Alt+s pour autre usage
bind-key C-space send-prefix                 # Ctrl+a deux fois envoie Ctrl+a à l'app

# ── SOURIS ──────────────────────────────────────────────────────────────────
set -g mouse on

# ── NUMÉROTATION ────────────────────────────────────────────────────────────
set -g base-index 1                      # fenêtres numérotées à partir de 1
set -g wrap-search off                   # pas de wrap lors des recherches

# ── PAS DE CONFIRMATION ────────────────────────────────────────────────────────────
set -g detach-on-destroy off
bind-key x kill-pane
bind-key & kill-window

# ── PANES ───────────────────────────────────────────────────────────────────
setw -g pane-base-index 1               # panes numérotés à partir de 1

unbind %
bind-key -n M-\\ split-window -h -c "#{pane_current_path}"  # Alt+\ = split vertical
unbind '"'
bind-key -n M-- split-window -v -c "#{pane_current_path}"   # Alt+- = split horizontal
unbind p
bind p split-window -v -c "#{pane_current_path}"             # prefix+p = split horizontal

bind -n C-M-j resize-pane -D 3          # Ctrl+Alt+j = agrandir vers le bas
bind -n C-M-k resize-pane -U 3          # Ctrl+Alt+k = agrandir vers le haut
bind -n C-M-l resize-pane -R 3          # Ctrl+Alt+l = agrandir vers la droite
bind -n C-M-h resize-pane -L 3          # Ctrl+Alt+h = agrandir vers la gauche

bind -n M-m resize-pane -Z              # Alt+m = plein écran (zoom) sur le pane actif

# bind-key -n 'M-h' select-pane -L       # Alt+h = aller au pane gauche
# bind-key -n 'M-j' select-pane -D       # Alt+j = aller au pane bas
# bind-key -n 'M-k' select-pane -U       # Alt+k = aller au pane haut
# bind-key -n 'M-l' select-pane -R       # Alt+l = aller au pane droit

bind -n M-K swap-pane -U               # Alt+K = swap pane vers le haut
bind -n M-J swap-pane -D               # Alt+J = swap pane vers le bas

# bordure plus visible
set -g pane-active-border-style fg=#fabd2f,bold
set -g pane-border-style fg=#3c3836
set -g pane-border-lines single
set -g pane-border-indicators arrows
set -g pane-border-status top

# ── FENÊTRES ────────────────────────────────────────────────────────────────
bind -n M-p previous-window             # Alt+p = fenêtre précédente
bind -n M-n next-window                 # Alt+n = fenêtre suivante
bind -n M-H swap-window -t +1           # Alt+H = déplace fenêtre vers la droite
bind -n M-L swap-window -t -1           # Alt+L = déplace fenêtre vers la gauche
unbind n
bind n new-window -c "#{pane_current_path}"  # prefix+n = nouvelle fenêtre dans le dossier actuel
bind-key -n M-s set-option -g status    # Alt+s = toggle la barre de statut
bind-key -n M-y copy-mode              # Alt+y = entre en mode copie

# ── BARRE DE STATUT ─────────────────────────────────────────────────────────
set-option -g status-position top       # barre en haut
set-option -g status-justify left       # contenu aligné à gauche
set -g status-left-length 85            # longueur max de la partie gauche
set -g status-style 'bg=default,fg=#fff4d2'  # couleurs de la barre (fond transparent)
set-option -g status-right '#[bg=#d8a657,fg=#000000,bold] #S '   # droite = nom de session
set-option -g status-left ''            # gauche = vide
set -g window-status-format "#[fg=#EBDBB2,bg=#504945,bold]  #I #[fg=#282828,bg=#A89984,bold] #W "
set -g window-status-current-format "#[fg=#282828,bg=#FABD2F,bold]  #I #[fg=#282828,bg=#83A598,bold] #W "

set -g window-status-format "#[fg=#fff4d2,bg=#484848,bold]  #I #[fg=#222222,bg=#a89984,bold] #W "
# fenêtre inactive : numéro sur fond gris, nom sur fond beige

set -g window-status-current-format "#[fg=#000000,bg=#d8a657,bold]  #I #[fg=#000000,bg=#83a598,bold] #W "
# fenêtre active : numéro sur fond jaune, nom sur fond vert

set -g message-style bg=#d8a657,fg=#1d1d1d,bold         # style des messages tmux
set -g message-command-style bg=#1d1d1d,fg=#d8a657,bold # style des messages en mode commande
set -g pane-active-border-style fg=#d8a657              # bordure du pane actif en jaune
set -g pane-border-style fg=#484848                     # bordures des panes inactifs en gris

# ── PLUGINS─────────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'

# set -g @plugin 'janders223/gruvbox-tmux'
# set -g @gruvbox-show-battery false
# set -g @gruvbox-show-network false
# set -g @gruvbox-show-weather false
# set -g @gruvbox-show-time false
# set -g @gruvbox-show-location false
# set -g @gruvbox-show-powerline true
# set -g @gruvbox-show-flags true
# set -g @gruvbox-show-timezone false
# set -g @plugin 'alexwforsythe/tmux-which-key'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

# ── AIDE RACCOURCIS STATUS BAR ────────────────────────────────────────────────────────
set -g status-right-length 300
set-option -g status-right '#[fg=#83A598,bold]C-hjkl:nav #[fg=#8EC07C,bold]Alt+\:vsplit Alt+-:hsplit #[fg=#FABD2F,bold]Alt+pn:win #[fg=#D3869B,bold]Alt+m:zoom #[fg=#B8BB26,bold]Alt+y:copy #[fg=#fe8019,bold]Alt+t:term #[fg=#fabd2f,bold]C-Space:prefix #[fg=#a9b665,bold]^+c:new-win #[fg=#fb4934,bold]^+x:kill #[fg=#FB4934,bold] #S '
