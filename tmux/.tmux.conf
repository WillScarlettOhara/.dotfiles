# ── TRUE COLOR ──────────────────────────────────────────────────────────────
set-window-option -g xterm-keys on
set -s extended-keys on
set -as terminal-features 'xterm\*:extkeys'
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Autoriser les applications (comme Neovim) à accéder au presse-papiers via OSC 52
set -s set-clipboard on

# Forcer le support du clipboard pour ton terminal (même en SSH)
set -as terminal-features ',xterm-256color:clipboard'

# ── FOR IMAGES IN NVIM ──────────────────────────────────────────────────────
set -g allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

# ── RELOAD ──────────────────────────────────────────────────────────────────
unbind r
bind r source-file ~/.tmux.conf \; display "Config Reloaded"

# ── TERMINAL FLOTTANT (Vrai Toggle) ─────────────────────────────────────────
bind -n M-t if-shell -F '#{==:#{session_name},scratch}' 'detach-client' 'display-popup -d "#{pane_current_path}" -w 80% -h 80% -E "tmux new-session -A -s scratch"'

# ── PREFIX ──────────────────────────────────────────────────────────────────
set -g prefix C-space
unbind C-b
unbind M-s
bind-key C-space send-prefix

# ── SOURIS & NUMÉROTATION ───────────────────────────────────────────────────
set -g mouse on
set -g base-index 1
set -g wrap-search off
setw -g pane-base-index 1

# ── PAS DE CONFIRMATION ─────────────────────────────────────────────────────
set -g detach-on-destroy off
bind-key x kill-pane
bind-key & kill-window

# ── PANES ───────────────────────────────────────────────────────────────────
unbind %
bind-key -n M-\\ split-window -h -c "#{pane_current_path}"
unbind '"'
bind-key -n M-- split-window -v -c "#{pane_current_path}"
unbind p
bind p split-window -v -c "#{pane_current_path}"

bind -n C-M-j resize-pane -D 3
bind -n C-M-k resize-pane -U 3
bind -n C-M-l resize-pane -R 3
bind -n C-M-h resize-pane -L 3
bind -n M-m resize-pane -Z

bind -n M-K swap-pane -U
bind -n M-J swap-pane -D

set -g pane-active-border-style fg=#fabd2f,bold
set -g pane-border-style fg=#473C29
set -g pane-border-lines heavy
set -g pane-border-indicators arrows
set -g pane-border-status top
set -g window-style 'bg=default'
set -g window-active-style 'bg=default'

# ── FENÊTRES ────────────────────────────────────────────────────────────────
bind -n M-p previous-window
bind -n M-n next-window
bind -n M-H swap-window -t +1
bind -n M-L swap-window -t -1
unbind n
bind n new-window -c "#{pane_current_path}"
bind-key -n M-s set-option -g status
bind-key -n M-y copy-mode

# ── BARRE DE STATUT ─────────────────────────────────────────────────────────
set-option -g status-position top
set-option -g status-justify left
set -g status-left-length 85
set -g status-style 'bg=default,fg=#fff4d2'
set-option -g status-left ''
set -g window-status-format "#[fg=#fff4d2,bg=#484848,bold]  #I #[fg=#222222,bg=#a89984,bold] #W "
set -g window-status-current-format "#[fg=#000000,bg=#d8a657,bold]  #I #[fg=#000000,bg=#83a598,bold] #W "
set -g message-style bg=#d8a657,fg=#1d1d1d,bold
set -g message-command-style bg=#1d1d1d,fg=#d8a657,bold

# ── AIDE RACCOURCIS ─────────────────────────────────────────────────────────
set -g status-right-length 300
set-option -g status-right '#[fg=#83A598,bold]C-hjkl:nav #[fg=#8EC07C,bold]Alt+\:vsplit Alt+-:hsplit #[fg=#FABD2F,bold]Alt+pn:win #[fg=#D3869B,bold]Alt+m:zoom #[fg=#B8BB26,bold]Alt+y:copy #[fg=#fe8019,bold]Alt+t:term #[fg=#fabd2f,bold]C-Space:prefix #[fg=#a9b665,bold]^+c:new-win #[fg=#fb4934,bold]^+x:kill #[fg=#fb4934,bold]#{?window_zoomed_flag, 󰊓 ZOOM ,}#[fg=#FB4934,bold] #S '

# ── PLUGINS ─────────────────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @continuum-restore 'on'
set -g @resurrect-capture-pane-contents 'on'

run '~/.tmux/plugins/tpm/tpm'
